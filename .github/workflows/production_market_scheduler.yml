name: Continuous Automated Indian Stock Market AI Research Engine Pipeline

on:
  schedule:
    # 03:15 AM UTC triggers precisely at 08:45 AM IST every morning Monday through Friday
    - cron: '15 3 * * 1-5'
  
  # Workflow Dispatch inclusion enables on-demand manual verification execution triggers
  workflow_dispatch:

jobs:
  initialize-production-agent:
    runs-on: ubuntu-latest
    
    # FIXED: This line automatically bypasses the need for the GitHub website settings menus!
    permissions:
      contents: write

    steps:
      - name: Code Inventory Checkouts
        uses: actions/checkout@v4

      - name: Deploy Isolated Python 3.11 Execution Matrix Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Download High-Performance Core Packages Infrastructure Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy scikit-learn lightgbm xgboost requests ta gnews vaderSentiment mlflow

      - name: Preseed Structural Application Database Containers
        run: python database_layer.py

      - name: Execute Multi-Threaded Asynchronous AI Research Agent Loop Broker
        run: python main_agent.py
